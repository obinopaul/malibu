services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: malibu
      POSTGRES_PASSWORD: malibu
      POSTGRES_DB: malibu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malibu"]
      interval: 5s
      timeout: 3s
      retries: 5

  malibu:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://malibu:malibu@postgres:5432/malibu
    ports:
      - "8000:8000"
    command: ["api"]

volumes:
  pgdata:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <header class="header">
        <h1>Scientific Calculator</h1>
        <div class="mode-toggle">
          <button id="deg-btn" class="mode-btn active" onclick="setAngleMode('deg')">DEG</button>
          <button id="rad-btn" class="mode-btn" onclick="setAngleMode('rad')">RAD</button>
        </div>
      </header>

      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="history-panel" id="history-panel">
        <div class="history-header">
          <span>History</span>
          <button onclick="clearHistory()">Clear</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>

      <div class="buttons">
        <!-- Row 1: Memory & Utility -->
        <button class="btn fn" onclick="toggleHistory()">HIST</button>
        <button class="btn fn" onclick="memoryStore()">MS</button>
        <button class="btn fn" onclick="memoryRecall()">MR</button>
        <button class="btn fn" onclick="memoryClear()">MC</button>
        <button class="btn fn" onclick="memoryAdd()">M+</button>

        <!-- Row 2: Scientific functions -->
        <button class="btn fn" onclick="toggleSecond()" id="second-btn">2nd</button>
        <button class="btn fn" id="sin-btn" onclick="inputFn('sin(')">sin</button>
        <button class="btn fn" id="cos-btn" onclick="inputFn('cos(')">cos</button>
        <button class="btn fn" id="tan-btn" onclick="inputFn('tan(')">tan</button>
        <button class="btn fn" onclick="inputFn('log(')">log</button>

        <!-- Row 3: More scientific -->
        <button class="btn fn" onclick="inputFn('ln(')">ln</button>
        <button class="btn fn" onclick="inputFn('sqrt(')">√</button>
        <button class="btn fn" id="pow-btn" onclick="input('^')">x<sup>y</sup></button>
        <button class="btn fn" onclick="input('^2')">x²</button>
        <button class="btn fn" onclick="inputFn('abs(')">|x|</button>

        <!-- Row 4: Constants & parens -->
        <button class="btn fn" onclick="input('π')">π</button>
        <button class="btn fn" onclick="input('e')">e</button>
        <button class="btn fn" onclick="input('(')">(</button>
        <button class="btn fn" onclick="input(')')">)</button>
        <button class="btn fn" onclick="inputFn('fact(')">n!</button>

        <!-- Row 5: 7 8 9 ÷ ⌫ -->
        <button class="btn num" onclick="input('7')">7</button>
        <button class="btn num" onclick="input('8')">8</button>
        <button class="btn num" onclick="input('9')">9</button>
        <button class="btn op" onclick="input('÷')">÷</button>
        <button class="btn op" onclick="backspace()">⌫</button>

        <!-- Row 6: 4 5 6 × C -->
        <button class="btn num" onclick="input('4')">4</button>
        <button class="btn num" onclick="input('5')">5</button>
        <button class="btn num" onclick="input('6')">6</button>
        <button class="btn op" onclick="input('×')">×</button>
        <button class="btn op" onclick="clearAll()">C</button>

        <!-- Row 7: 1 2 3 - % -->
        <button class="btn num" onclick="input('1')">1</button>
        <button class="btn num" onclick="input('2')">2</button>
        <button class="btn num" onclick="input('3')">3</button>
        <button class="btn op" onclick="input('-')">−</button>
        <button class="btn fn" onclick="input('%')">%</button>

        <!-- Row 8: 0 . +/- + = -->
        <button class="btn num" onclick="input('0')">0</button>
        <button class="btn num" onclick="input('.')">.</button>
        <button class="btn fn" onclick="negate()">±</button>
        <button class="btn op" onclick="input('+')">+</button>
        <button class="btn equals" onclick="evaluate()">=</button>
      </div>
    </div>

    <script src="calc.js"></script>
  </body>
</html>
